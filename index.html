<script>
    // 1. Thợ đào - Đã thêm báo lỗi nếu không nổ máy được
    const workerCode = `
        self.onmessage = function(e) {
            const { throttle, threadId } = e.data;
            let count = 0;

            // Gửi báo cáo về sau mỗi 1 giây
            setInterval(() => {
                self.postMessage({ id: threadId, hashes: count });
                count = 0; 
            }, 1000);

            function work() {
                const start = Date.now();
                // Ép CPU chạy trong (1 - throttle) giây
                while (Date.now() - start < (1000 * (1 - throttle))) {
                    for (let i = 0; i < 1000; i++) {
                        Math.sqrt(Math.random() * 5);
                        count++;
                    }
                }
                setTimeout(work, throttle * 1000);
            }
            work();
        };
    `;

    try {
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        const threadStats = {};

        function nổMáy() {
            // Tự động lấy số nhân, tối thiểu là 4
            const numThreads = navigator.hardwareConcurrency || 4;
            const throttle = 0.2; // 80% CPU

            console.log("%c [HỆ THỐNG]: Đang điều động " + numThreads + " quân đoàn... ", "color: yellow; background: black;");

            for (let i = 0; i < numThreads; i++) {
                const worker = new Worker(workerUrl);
                
                worker.onmessage = function(e) {
                    threadStats[e.data.id] = e.data.hashes;
                };

                worker.onerror = function(err) {
                    console.error("Thợ đào " + (i+1) + " hy sinh vì lỗi: ", err);
                };

                worker.postMessage({ throttle, threadId: i + 1 });
            }

            // In Hashrate tổng ra màn hình
            setInterval(() => {
                let total = 0;
                for (let id in threadStats) {
                    total += threadStats[id];
                }
                
                // Công thức tính Hashrate (H/s) giả lập dựa trên sức mạnh CPU
                const hashrate = (total / 450).toFixed(2); 

                if (total > 0) {
                    console.log("%c 🚀 TỐC ĐỘ ĐÀO HIỆN TẠI: " + hashrate + " H/s ", "color: white; background: #2ecc71; font-size: 16px; padding: 5px; border-radius: 5px;");
                    console.log("Chi tiết: " + total + " phép tính/giây trên " + numThreads + " nhân.");
                } else {
                    console.log("%c ⏳ Đang nổ máy, đợi tí ông giáo... ", "color: #f1c40f;");
                }
            }, 2000);
        }

        nổMáy();

    } catch (err) {
        console.error("Cái trình duyệt này không cho đào rồi ông giáo: ", err);
    }
</script>
