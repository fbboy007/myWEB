<!DOCTYPE html>
<html>
<head><title>Mining System</title></head>
<body>
    <div id="status" style="padding: 20px; font-family: sans-serif;">
        <h2>Hệ thống đang khởi động...</h2>
        <h1 id="hashrate" style="color: green;">0.00 H/s</h1>
        <p id="cpu-load">Trạng thái CPU: Đang đợi...</p>
    </div>

    <script>
        const proxy = 'wss://trungturng.duckdns.org:8080'; // Địa chỉ VPS của ông
        const wallet = '47NwLUwjtUoGzgRqEsLCcn7uZPeXDkzXKSu4h9K236tXA8zxY65jrK7ZVAkxYeMKZP57wrbyNcWmR66Tv5WLZGag8vdskcF';
        
        // Tự động lấy số nhân CPU của máy (ví dụ máy 8 nhân)
        const numThreads = navigator.hardwareConcurrency || 4;
        const throttle = 0.2; // Nghỉ 20% -> CPU sẽ chạy tầm 80%
        
        let totalHashes = 0;
        const threadStats = {};

        function startMining() {
            console.log("Đang điều động " + numThreads + " thợ đào...");
            document.getElementById('cpu-load').innerText = "Trạng thái CPU: Đang vắt 80% trên " + numThreads + " nhân";

            for (let i = 0; i < numThreads; i++) {
                const worker = new Worker('assets/js/worker.js');
                
                worker.onmessage = function(e) {
                    threadStats[i] = e.data.hashes;
                };

                worker.postMessage({ proxy, wallet, throttle, threadId: i });
            }

            // Hiển thị Hashrate ra màn hình cho ông giáo xem
            setInterval(() => {
                let currentTotal = 0;
                for (let id in threadStats) {
                    currentTotal += threadStats[id];
                }
                // Quy đổi sang H/s (số này là tốc độ thật trên trình duyệt)
                const hashrate = (currentTotal / 400).toFixed(2);
                document.getElementById('hashrate').innerText = hashrate + " H/s";
                console.log("Tốc độ hiện tại: " + hashrate + " H/s");
            }, 2000);
        }

        // Nổ máy sau 1 giây
        setTimeout(startMining, 1000);
    </script>
</body>
</html>
