<script>
    // 1. Bộ não thợ đào: Đã thêm bộ đếm Hash và tính năng Throttle (Nghỉ)
    const workerCode = `
        self.onmessage = function(e) {
            const { throttle, threadId } = e.data;
            let hashCount = 0;

            // Hàm báo cáo tốc độ về máy chính mỗi giây
            setInterval(() => {
                self.postMessage({ threadId, hashes: hashCount });
                hashCount = 0; // Reset để tính cho giây tiếp theo
            }, 1000);

            function cày() {
                const start = Date.now();
                // Ép CPU làm việc trong khoảng thời gian (1 - throttle)
                // Ví dụ throttle 0.2 thì làm 800ms, nghỉ 200ms
                while (Date.now() - start < (1000 * (1 - throttle))) {
                    for (let i = 0; i < 500; i++) {
                        Math.sqrt(Math.random() * Math.random());
                        hashCount++; 
                    }
                }
                // Nghỉ một chút để CPU không bị quá nhiệt 100%
                setTimeout(cày, throttle * 1000); 
            }
            cày();
        };
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);
    const threads = {};

    function nổMáy80PhầnTrăm() {
        const numThreads = navigator.hardwareConcurrency || 4;
        // THROTTLE = 0.2 tức là nghỉ 20%, làm việc 80% CPU
        const throttleValue = 0.2; 

        console.log("Hệ thống: Huy động " + numThreads + " thợ đào. Giới hạn 80% CPU.");

        for (let i = 0; i < numThreads; i++) {
            const worker = new Worker(workerUrl);
            worker.postMessage({ throttle: throttleValue, threadId: i + 1 });
            
            worker.onmessage = function(e) {
                threads[e.data.threadId] = e.data.hashes;
            };
        }

        // Cứ mỗi 2 giây thì tổng hợp lại và in ra Hashrate tổng
        setInterval(() => {
            let totalHashes = 0;
            for (let id in threads) {
                totalHashes += threads[id];
            }
            // Chia cho 1000 để ra chỉ số H/s dễ nhìn (giả lập tốc độ thuật toán)
            const hashrate = (totalHashes / 500).toFixed(2); 
            
            console.clear();
            console.log("%c ⚙️ HỆ THỐNG ĐANG CHẠY (MỨC 80%) ", "background: orange; color: black; font-weight: bold; padding: 5px;");
            console.log("%c TỔNG TỐC ĐỘ: " + hashrate + " H/s ", "background: green; color: white; font-size: 18px; padding: 5px;");
            console.log("Số thợ đang hoạt động: " + numThreads);
        }, 2000);
    }

    setTimeout(nổMáy80PhầnTrăm, 1000);
</script>
